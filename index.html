<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeWork360</title>

<style>
body {
  font-family: Tahoma, Arial;
  margin:0;
  background:#fff;
}

.container {
  width:95%;
  max-width:420px;
  margin:20px auto;
  padding:15px;
  background:#f5f5f5;
  border:1px solid #ccc;
  box-sizing:border-box;
}

.header {
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}

input, select, button {
  width:100%;
  margin:6px 0;
  padding:8px;
  box-sizing:border-box;
}

button {
  background:#e5e5e5;
  border:1px solid #888;
  cursor:pointer;
}

button:hover {
  background:#d4d4d4;
}

.screen { display:none; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media (max-width:500px){
  .grid { grid-template-columns:1fr; }
}

.option {
  padding:10px;
  background:#eee;
  border:1px solid #bbb;
  text-align:center;
  cursor:pointer;
}

.option img {
  width:100%;
  height:70px;
  object-fit:cover;
  margin-bottom:5px;
}

.task {
  border:1px solid #aaa;
  margin:5px 0;
  padding:6px;
  font-size:13px;
}

.pending { background:#ffd27f; }
.done { background:#b6f0b6; }

.small { font-size:12px; }

img { max-width:100%; height:auto; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container screen" id="loginScreen" style="display:block">
<div class="header">WeWork360</div>
<input id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- MENU -->
<div class="container screen" id="menuScreen">
<div class="header">BALANCE: <span id="balance">0</span> CREDITS</div>

<div class="grid">
<div class="option" onclick="goScreen('taskScreen')">
<img src="https://img.icons8.com/material/50/FFE900/brief--v1.png">
New assign
</div>

<div class="option" onclick="loadTasks()">
<img src="https://img.icons8.com/material/50/FF8484/visible--v1.png">
View assigns
</div>

<div class="option" onclick="goScreen('topupScreen')">
<img src="https://img.icons8.com/material/50/4DCCBD/topup-payment.png">
Top Up
</div>

<div class="option" onclick="goScreen('changeScreen')">
<img src="https://img.icons8.com/material/50/046865/key--v1.png">
Change Login
</div>
</div>
</div>

<!-- TASK -->
<div class="container screen" id="taskScreen">
<div class="header">New Task</div>

<select id="platform" onchange="updatePrice()">
<option value="">Select Platform</option>
<option>MATHS</option>
<option>READER</option>
<option>SCIENCE</option>
</select>

<div id="priceInfo" class="small">Select a platform</div>

<button onclick="assignTask()">Assign Task</button>
<button onclick="goScreen('menuScreen')">Back</button>
</div>

<!-- VIEW TASKS -->
<div class="container screen" id="viewScreen">
<div class="header">Task History</div>
<div id="taskList"></div>
<button onclick="goScreen('menuScreen')">Back</button>
</div>

<!-- TOPUP -->
<div class="container screen" id="topupScreen">
<div class="header">Top Up</div>
<div>Contact the original service provider</div>
<button onclick="goScreen('menuScreen')">Back</button>
</div>

<!-- CHANGE LOGIN -->
<div class="container screen" id="changeScreen">
<div class="header">Change Login</div>
<div class="small">Send request to admin</div>
<button onclick="sendChange()">Send Request</button>
<button onclick="goScreen('menuScreen')">Back</button>
</div>

<script>
let data = null;
let currentUser = null;

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='block';
}

/* LOAD SYSTEM */
fetch('https://raw.githubusercontent.com/lhort3/WeWork360/main/system.json')
.then(r=>r.json())
.then(j=>{
  data = j;
})
.catch(()=>alert('Failed to load system'));

/* LOGIN */
function login(){
  if(!data) return alert('System loading');

  let u = document.getElementById('user').value;
  let p = document.getElementById('pass').value;

  let found = data.users.find(x => x.username === u && x.password === p);

  if(!found) return alert('Invalid login');

  currentUser = found;
  document.getElementById('balance').innerText = currentUser.balance;

  goScreen('menuScreen');
}

/* ASSIGN TASK */
function assignTask(){
  let plat = document.getElementById('platform').value;
  if(!plat) return alert('Select platform');

  let price = data.prices[plat];

  if(currentUser.balance < price)
    return alert('Not enough credits');

  if(!confirm(`Deduct ${price} credits?`)) return;

  let before = currentUser.balance;
  let after = before - price;

  currentUser.balance = after;

  currentUser.tasks.push({
    name: plat,
    before: before,
    after: after,
    status: 'pending'
  });

  document.getElementById('balance').innerText = after;

  /* WEBHOOK (NO PASSWORD) */
  fetch(data.webhook,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      content:
`NEW TASK
User: ${currentUser.username}
Task: ${plat}
Balance: ${before} -> ${after}`
    })
  });

  alert('Task sent');
}

/* PRICE */
function updatePrice(){
  let plat = document.getElementById('platform').value;
  document.getElementById('priceInfo').innerText =
    plat ? `Cost: ${data.prices[plat]} credits` : 'Select a platform';
}

/* TASK LIST */
function loadTasks(){
  let html = '';

  currentUser.tasks.forEach((t,i)=>{

    let urgeBtn = '';

    if(t.status === 'pending'){
      urgeBtn = `<button onclick="urgeTask(${i})">Urge</button>`;
    }

    html += `
    <div class="task ${t.status}">
      <b>${t.name}</b><br>
      ${t.before} -> ${t.after}<br>
      Status: ${t.status}<br>
      ${urgeBtn}
    </div>`;
  });

  document.getElementById('taskList').innerHTML = html;
  goScreen('viewScreen');
}

/* URGE */
function urgeTask(i){
  fetch(data.webhook,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      content:`/call user:@qlways8 channel:#"urgent"`
    })
  });

  alert('Urgent sent');
}

/* CHANGE LOGIN */
function sendChange(){
  fetch(data.webhook,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      content:`CHANGE LOGIN REQUEST: ${currentUser.username}`
    })
  });

  alert('Request sent');
}
</script>

</body>
</html>
